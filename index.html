<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌌 维度探索器 - 穿越十一维度的神秘旅程</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-void: #030308;
      --color-cosmic: #0a0a1f;
      --color-nebula: #1a1a3e;
      --color-stellar: #00d4ff;
      --color-aurora: #7b2dff;
      --color-nova: #ff6b35;
      --color-quasar: #ffd700;
      --glow-sm: 0 0 10px rgba(0, 212, 255, 0.3);
      --glow-md: 0 0 20px rgba(0, 212, 255, 0.5);
      --glow-lg: 0 0 30px rgba(0, 212, 255, 0.7);
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(180deg, var(--color-void), var(--color-cosmic), var(--color-nebula));
      color: #ffffff;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* 滚动条样式 */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: var(--color-void);
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--color-stellar), var(--color-aurora));
      border-radius: 5px;
    }

    /* 导航栏 */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 1rem 2rem;
      background: rgba(3, 3, 8, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: var(--glow-sm);
    }

    .navbar-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 1.5rem;
      font-weight: bold;
      background: linear-gradient(135deg, var(--color-stellar), var(--color-aurora));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--color-stellar), var(--color-aurora));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      box-shadow: var(--glow-md);
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: #a0a0a0;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-links a:hover {
      color: var(--color-stellar);
      transform: translateY(-2px);
    }

    /* 英雄区域 */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 2rem 50px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
      animation: rotate 30s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .hero-content {
      text-align: center;
      max-width: 1000px;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.5rem;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 50px;
      font-size: 0.9rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
    }

    .hero-title {
      font-size: 4rem;
      font-weight: 900;
      margin-bottom: 1.5rem;
      line-height: 1.2;
    }

    .hero-title .highlight {
      background: linear-gradient(135deg, var(--color-stellar), var(--color-aurora), var(--color-nova));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: 1.5rem;
      color: #a0a0a0;
      margin-bottom: 1rem;
    }

    .hero-description {
      font-size: 1.1rem;
      color: #808080;
      margin-bottom: 3rem;
    }

    .hero-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 1rem 2.5rem;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--color-stellar), var(--color-aurora));
      color: white;
      box-shadow: var(--glow-md);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: var(--glow-lg);
    }

    .btn-secondary {
      background: rgba(0, 212, 255, 0.1);
      color: var(--color-stellar);
      border: 2px solid var(--color-stellar);
    }

    .btn-secondary:hover {
      background: rgba(0, 212, 255, 0.2);
      transform: translateY(-3px);
    }

    .scroll-indicator {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: #606060;
      font-size: 0.8rem;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(10px); }
    }

    /* 主要内容区域 */
    .main-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 50px 2rem;
    }

    .section {
      margin-bottom: 100px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .section-title {
      font-size: 2.5rem;
      font-weight: bold;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .section-subtitle {
      color: #808080;
      font-size: 1.1rem;
    }

    /* 维度卡片网格 */
    .dimension-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
    }

    .dimension-card {
      background: rgba(10, 10, 31, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 2rem;
      transition: all 0.3s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .dimension-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--color-stellar), var(--color-aurora), var(--color-nova));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .dimension-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: rgba(0, 212, 255, 0.3);
      box-shadow: var(--glow-md);
    }

    .dimension-card:hover::before {
      opacity: 1;
    }

    .dimension-emoji {
      font-size: 4rem;
      margin-bottom: 1rem;
      display: block;
    }

    .dimension-number {
      font-size: 0.9rem;
      color: var(--color-stellar);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
    }

    .dimension-name {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
      color: white;
    }

    .dimension-chinese {
      font-size: 1.2rem;
      color: var(--color-aurora);
      margin-bottom: 1rem;
    }

    .dimension-description {
      color: #a0a0a0;
      line-height: 1.8;
      font-size: 0.95rem;
    }

    /* 理论卡片 */
    .theory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
    }

    .theory-card {
      background: rgba(10, 10, 31, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 15px;
      padding: 1.5rem;
      transition: all 0.3s;
    }

    .theory-card:hover {
      background: rgba(10, 10, 31, 0.8);
      border-color: rgba(0, 212, 255, 0.2);
      transform: translateY(-5px);
    }

    .theory-emoji {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .theory-name {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
      color: white;
    }

    .theory-description {
      color: #808080;
      font-size: 0.95rem;
    }

    /* 科学家卡片 */
    .scientist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
    }

    .scientist-card {
      background: rgba(10, 10, 31, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 15px;
      padding: 1.5rem;
      text-align: center;
      transition: all 0.3s;
    }

    .scientist-card:hover {
      transform: scale(1.05);
      border-color: rgba(0, 212, 255, 0.2);
    }

    .scientist-emoji {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .scientist-name {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
      color: white;
    }

    .scientist-contribution {
      color: var(--color-stellar);
      font-size: 0.9rem;
    }

    /* 页脚 */
    .footer {
      background: rgba(3, 3, 8, 0.8);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding: 3rem 2rem;
      text-align: center;
    }

    .footer-social {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.5rem;
    }

    .footer-social a {
      font-size: 1.5rem;
      transition: transform 0.3s;
      display: inline-block;
    }

    .footer-social a:hover {
      transform: scale(1.2);
    }

    .footer-text {
      color: #606060;
      font-size: 0.9rem;
    }

    .footer-subtext {
      color: #404040;
      font-size: 0.8rem;
      margin-top: 0.5rem;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .hero-title {
        font-size: 2.5rem;
      }

      .hero-subtitle {
        font-size: 1.2rem;
      }

      .nav-links {
        display: none;
      }

      .dimension-grid {
        grid-template-columns: 1fr;
      }

      .theory-grid,
      .scientist-grid {
        grid-template-columns: 1fr;
      }
    }

    /* 动画 */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.6s ease-out;
    }

    /* 模态框 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(135deg, rgba(10, 10, 31, 0.95), rgba(3, 3, 8, 0.95));
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 20px;
      padding: 2rem;
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .modal-close {
      margin-left: auto;
      background: none;
      border: none;
      color: #808080;
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.3s;
    }

    .modal-close:hover {
      color: white;
    }

    .modal-body {
      color: #a0a0a0;
      line-height: 1.8;
    }

    /* 加载动画 */
    .loader {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--color-void);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }

    .loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-content {
      text-align: center;
    }

    .loader-emoji {
      font-size: 5rem;
      margin-bottom: 1rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .loader-text {
      color: var(--color-stellar);
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }

    .loader-subtext {
      color: #606060;
      font-size: 0.9rem;
    }

    /* 维度详情界面 */
    .dimension-detail-view {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, var(--color-void), var(--color-cosmic), var(--color-nebula));
      z-index: 3000;
      overflow-y: auto;
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .dimension-detail-view.active {
      display: block;
      opacity: 1;
    }

    .detail-header {
      position: sticky;
      top: 0;
      background: rgba(3, 3, 8, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 212, 255, 0.2);
      padding: 1rem 2rem;
      z-index: 100;
      box-shadow: var(--glow-md);
    }

    .detail-header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .detail-back-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: rgba(0, 212, 255, 0.1);
      border: 2px solid var(--color-stellar);
      border-radius: 50px;
      color: var(--color-stellar);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .detail-back-btn:hover {
      background: rgba(0, 212, 255, 0.2);
      transform: translateX(-5px);
    }

    .detail-title {
      font-size: 1.5rem;
      font-weight: bold;
      background: linear-gradient(135deg, var(--color-stellar), var(--color-aurora));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .detail-hero {
      padding: 4rem 2rem;
      text-align: center;
      background: radial-gradient(circle at center, rgba(0, 212, 255, 0.15) 0%, transparent 70%);
    }

    .detail-emoji {
      font-size: 10rem;
      margin-bottom: 2rem;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    .detail-number-badge {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      background: linear-gradient(135deg, var(--color-stellar), var(--color-aurora));
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 1rem;
    }

    .detail-names {
      margin-bottom: 1.5rem;
    }

    .detail-name-en {
      font-size: 3rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
    }

    .detail-name-cn {
      font-size: 2rem;
      color: var(--color-aurora);
    }

    .detail-description {
      font-size: 1.3rem;
      color: #a0a0a0;
      max-width: 900px;
      margin: 0 auto 2rem;
      line-height: 1.8;
    }

    .detail-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .detail-section {
      margin-bottom: 3rem;
    }

    .detail-section-title {
      font-size: 1.8rem;
      font-weight: bold;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--color-stellar);
    }

    .detail-card {
      background: rgba(10, 10, 31, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }

    .detail-card:hover {
      border-color: rgba(0, 212, 255, 0.3);
      box-shadow: var(--glow-md);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: rgba(0, 212, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 15px;
      padding: 1.5rem;
      text-align: center;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: bold;
      background: linear-gradient(135deg, var(--color-stellar), var(--color-aurora));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .stat-label {
      color: #808080;
      font-size: 0.9rem;
    }

    .info-list {
      list-style: none;
    }

    .info-list li {
      padding: 1rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .info-list li:last-child {
      border-bottom: none;
    }

    .info-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .info-content {
      flex: 1;
    }

    .info-title {
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: white;
    }

    .info-text {
      color: #808080;
      font-size: 0.95rem;
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
    }

    .related-card {
      background: rgba(10, 10, 31, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 15px;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .related-card:hover {
      transform: translateY(-5px);
      border-color: rgba(0, 212, 255, 0.3);
      box-shadow: var(--glow-md);
    }

    .related-emoji {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .related-name {
      font-weight: bold;
      margin-bottom: 0.25rem;
    }

    .related-relation {
      font-size: 0.85rem;
      color: var(--color-stellar);
      margin-bottom: 0.5rem;
    }

    .related-desc {
      font-size: 0.9rem;
      color: #808080;
    }

    .knowledge-box {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(123, 45, 255, 0.1));
      border: 2px solid rgba(0, 212, 255, 0.3);
      border-radius: 15px;
      padding: 2rem;
      margin-top: 2rem;
    }

    .knowledge-title {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .timeline {
      position: relative;
      padding-left: 2rem;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--color-stellar), var(--color-aurora));
      border-radius: 3px;
    }

    .timeline-item {
      position: relative;
      margin-bottom: 2rem;
      padding-left: 1.5rem;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -2.35rem;
      top: 0.5rem;
      width: 12px;
      height: 12px;
      background: var(--color-stellar);
      border-radius: 50%;
      box-shadow: var(--glow-md);
    }

    .timeline-item:last-child {
      margin-bottom: 0;
    }

    .timeline-year {
      font-weight: bold;
      color: var(--color-stellar);
      margin-bottom: 0.25rem;
    }

    .timeline-event {
      color: #a0a0a0;
    }
</head>
<body>
  <!-- 加载动画 -->
  <div class="loader" id="loader">
    <div class="loader-content">
      <div class="loader-emoji">🌌</div>
      <div class="loader-text">正在启动维度引擎...</div>
      <div class="loader-subtext">加载宇宙数据中</div>
    </div>
  </div>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="navbar-content">
      <div class="logo">
        <div class="logo-icon">∞</div>
        <span>DIMENSION EXPLORER</span>
      </div>
      <ul class="nav-links">
        <li><a href="#hero">🏠 首页</a></li>
        <li><a href="#dimensions">📐 维度</a></li>

      document.getElementById('detail-name-en').textContent = dim.name;

      document.getElementById('detail-description').textContent = dim.description;
      document.getElementById('detail-header-title').textContent = `${dim.number}D - ${dim.chineseName}`;

          <div class="stat-label">${getStatLabel(key)}</div>
